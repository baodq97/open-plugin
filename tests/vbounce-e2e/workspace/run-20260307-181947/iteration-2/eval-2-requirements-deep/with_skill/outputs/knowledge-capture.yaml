      reusable: true

    - learning: "Task management domain has standard RBAC patterns (Owner/Admin/Member/Viewer) that map cleanly to 4-role authorization model"
      category: technical
      reusable: true

    - learning: "Webhook retry specifications (1s/4s/16s exponential backoff) were explicit in PRD, reducing ambiguity in F3 significantly"
