learnings:
  - category: architecture
    insight: >
      Clean Architecture with 4 explicit layers (Domain, Application, Infrastructure, Interface)
      enables strong separation of concerns. The domain layer has zero framework imports -- all
      entities, enums, ports, and events are pure TypeScript interfaces. This makes the core
      business logic testable without any infrastructure dependencies and allows swapping
      PostgreSQL for another store by implementing the port interfaces.
    evidence: "implementation/summary.md -- Domain Layer (18 files, 207 lines, no external imports); src/domain/ports/*.ts define abstract repository contracts"
    reusable: true

  - category: architecture
    insight: >
      Manual dependency injection via a single app factory function (createApp) is a pragmatic
      alternative to DI containers for mid-size projects. All repositories, services, and
      controllers are instantiated and wired in one place (src/interface/http/app.ts, ~120 lines),
      making the dependency graph explicit and easy to trace. This avoids the magic of decorator-based
      DI while keeping the composition root centralized.
    evidence: "src/interface/http/app.ts lines 44-119 -- createApp() wires repos -> services -> controllers -> routes in sequence"
    reusable: true

  - category: architecture
    insight: >
      Domain events implemented as a simple in-process emitter (DomainEventEmitter singleton)
      decouple the task service from webhook delivery. The task service fires events and
      immediately returns; webhook delivery is handled asynchronously by a subscriber. Failures
      in webhook delivery do not propagate back to the caller due to .catch(() => {}) on the
      emit call. This is appropriate for single-instance deployments but would need to be
      replaced with a message broker (e.g., Redis Streams, RabbitMQ) for multi-instance scaling.
    evidence: "src/domain/events/domain-events.ts -- DomainEventEmitter class; src/application/services/task-service.ts line 64-70 -- .catch(() => {})"
    reusable: true

  - category: packages
    insight: >
      All 19 npm packages (10 production, 9 dev) were verified against the npm registry with
      no hallucinated packages. Several packages from the design phase were deliberately excluded
      (jsonapi-serializer, pino, node-cron, rate-limit-redis, supertest) in favor of simpler
      alternatives: custom serializers, console.log, setTimeout-based scheduler, in-memory rate
      limiter, and test stubs. This reduces the dependency surface area while keeping the door
      open for upgrades later.
    evidence: "implementation/package-verification.md -- 19 verified packages, 5 excluded with rationale; zero hallucinated packages"
    reusable: true

  - category: packages
    insight: >
      Leveraging Node.js built-in modules (node:crypto, node:test, node:assert, node:fs, node:path)
      for cryptography, testing, and file operations eliminates 5 potential external dependencies.
      Using node:test instead of Jest or Mocha simplifies the toolchain and avoids configuration
      overhead. The trade-off is less feature-rich test output, but for a project with 31 unit
      tests and 74 integration skeletons, this is acceptable.
    evidence: "implementation/package-verification.md -- Built-in Dependencies section; test files use 'import { describe, it } from node:test'"
    reusable: true

  - category: testing
    insight: >
      The two-tier testing strategy (31 fully executable unit tests + 74 documented integration
      test skeletons) is effective for fast-track implementation. Unit tests cover validation
      schemas, service-layer RBAC, and security utilities (HMAC, SSRF), providing immediate
      confidence. Integration skeletons with precise names and skeleton IDs (T-AC-US-XXX-XXX-XX)
      create a clear contract for the testing phase, enabling the testing engineer to fill them
      in without re-analyzing requirements.
    evidence: "implementation/tests-created.md -- Coverage Summary table: 31 fully implemented unit tests, 74 integration skeletons mapped to skeleton IDs"
    reusable: true

  - category: testing
    insight: >
      Test skeleton IDs follow a structured naming convention (T-AC-US-{feature}-{story}-{acceptance})
      that directly traces back to requirements. This enables bidirectional traceability: from
      requirement to test and from test to requirement. The tests-created.md file serves as the
      traceability matrix for the testing phase, reducing the risk of missed coverage.
    evidence: "implementation/tests-created.md -- all 74 entries include skeleton IDs like T-AC-US-001-001-01 through T-NFR-007-001"
    reusable: true

  - category: security
    insight: >
      Defense-in-depth is implemented across multiple layers: JWT auth with both JWKS (production)
      and HS256 (dev) modes, explicit rejection of query-parameter tokens (SEC-AUTH-04), board-level
      RBAC enforced at the service layer (not middleware alone), parameterized SQL queries throughout,
      Zod validation on all inputs, 100KB body size limit, and rate limiting at 100 req/min per
      user. Each security control maps to a specific threat ID (STR-*) from the design phase.
    evidence: "src/interface/http/middleware/auth.ts -- dual JWT mode, query token rejection; implementation/summary.md -- Security Mitigations section with 15 controls"
    reusable: true

  - category: security
    insight: >
      Webhook security follows a comprehensive chain: HTTPS-only URLs enforced by Zod validation,
      secrets encrypted at rest with AES-256-GCM (iv:ciphertext:authTag format), secrets masked
      in API responses, HMAC-SHA256 payload signing for delivery verification, and SSRF protection
      via regex-based private IP blocking (IPv4 + IPv6 ranges). The encryption key defaults to a
      hardcoded value which must be overridden in production via WEBHOOK_ENCRYPTION_KEY env var.
    evidence: "src/application/services/webhook-service.ts lines 204-224 -- encryptSecret/decryptSecret; src/interface/webhook/webhook-delivery-driver.ts lines 22-32 -- PRIVATE_IP_PATTERNS"
    reusable: true

  - category: security
    insight: >
      The default encryption key ('default-encryption-key-32bytes!!') in webhook-service.ts is a
      security risk if not overridden in production. The .env.example documents WEBHOOK_ENCRYPTION_KEY
      but there is no startup validation that ensures it is set to a non-default value. This should
      be flagged during the review phase as a mandatory production checklist item.
    evidence: "src/application/services/webhook-service.ts lines 205, 215 -- fallback to 'default-encryption-key-32bytes!!'"
    reusable: true

  - category: patterns
    insight: >
      Soft delete for tasks (deleted_at timestamp + filtered queries) preserves audit trails
      while appearing deleted to users. The TaskService checks deleted_at !== null before returning
      tasks, and the repository's findByBoardId excludes soft-deleted records. Activity logs record
      deletion events, creating an immutable audit trail even after soft delete.
    evidence: "src/application/services/task-service.ts lines 77, 113, 169 -- deleted_at checks; infrastructure/database/migrations/003-create-tasks.sql -- deleted_at column"
    reusable: true

  - category: patterns
    insight: >
      Exponential backoff for webhook retries uses a fixed delay array [1s, 4s, 16s] with a
      maximum of 4 attempts. Failed deliveries are persisted with next_retry_at timestamps and
      re-enqueued via an in-process retry queue using setTimeout. This is simple and effective
      for single-instance deployments but would lose pending retries on process restart. A durable
      queue (e.g., BullMQ with Redis) would be needed for production resilience.
    evidence: "src/application/services/webhook-service.ts lines 134-174 -- handleFailedDelivery with BACKOFF_DELAYS and MAX_ATTEMPTS"
    reusable: true

  - category: patterns
    insight: >
      The JSON:API serialization is implemented with custom serializers rather than using a
      library like jsonapi-serializer. Each entity has a dedicated serializer (6 total) that
      handles field mapping and relationship links. This avoids a dependency and gives full
      control over the output format, which is important for strict JSON:API v1.1 compliance.
      The Content-Type header is set globally to 'application/vnd.api+json'.
    evidence: "src/interface/http/serializers/*.ts -- 6 custom serializer files; src/interface/http/app.ts lines 61-64 -- global Content-Type middleware"
    reusable: true

summary: >
  The TaskFlow API implementation follows Clean Architecture with 96 files across 4 layers, totaling
  4,637 lines. Key strengths include strict separation of domain logic from infrastructure via port
  interfaces, comprehensive security controls mapped to threat IDs, and a pragmatic testing strategy
  with 31 executable unit tests plus 74 traceable integration skeletons. The main risks for review
  are the hardcoded default encryption key, in-process-only webhook retry queue (no durability across
  restarts), and the in-process domain event emitter limiting horizontal scalability.

recommendations:
  - "Verify that WEBHOOK_ENCRYPTION_KEY is validated at startup to reject the default value in production environments"
  - "Review the in-process webhook retry queue for durability -- pending retries are lost on process restart; consider BullMQ or pg-boss for production"
  - "Confirm that the domain event emitter's fire-and-forget pattern (.catch(() => {})) does not silently drop critical webhook deliveries under load"
  - "Validate that SSRF protection covers DNS rebinding attacks, not just static private IP patterns -- hostname resolution should be checked post-DNS"
  - "Ensure integration test skeletons are promoted to executable tests before the testing phase gate, as only 31 of 74 tests currently execute"
  - "Review the auth middleware's dual-mode (HS256 dev + RS256 prod) to ensure HS256 cannot be enabled in production via an accidentally-set JWT_SECRET"
