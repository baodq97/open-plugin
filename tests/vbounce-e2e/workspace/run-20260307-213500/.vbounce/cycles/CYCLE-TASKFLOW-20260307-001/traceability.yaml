        health_checks:
          - "GET /healthz (liveness, every 10s)"
          - "GET /readyz (readiness, every 5s)"

      - nfr: NFR-004-002
        title: "Zero Data Loss"
        alerts:
          - TaskFlowHighErrorRate (CRITICAL, 5xx > 5%, 5min)
          - TaskFlowDBConnectionErrors (WARNING, > 5 errors, 5min)
        dashboard_panel: "Row 1: Error Rate"
        log_alert: "OutOfMemory, ECONNREFUSED"

      - nfr: NFR-004-003
        title: "Webhook Delivery Rate (>= 99%)"
        alerts:
          - TaskFlowWebhookFailureRate (CRITICAL, > 10%, 15min)
          - TaskFlowWebhookElevatedFailures (WARNING, > 5%, 15min)
          - TaskFlowWebhookPermanentlyFailed (WARNING, > 10/hr)
          - TaskFlowWebhookRetryBacklog (WARNING, > 50 pending, 5min)
        dashboard_panel: "Row 4: Webhook Delivery + Failure Rate + Retry Queue"
        slo: "Webhook Delivery >= 99%, 24-hour rolling"

      - nfr: NFR-005-001
        title: "JSON:API v1.1 Compliance"
        alerts:
          - TaskFlowClientErrorSpike (WARNING, 4xx > 25%, 10min)
        dashboard_panel: "Row 5: Requests by Status"

      - nfr: NFR-006-001
        title: "TypeScript Strict Mode"
        alerts: []
        note: "Build-time guarantee; enforced by Docker multi-stage build (compile failure = no image)"

      - nfr: NFR-006-002
        title: "Test Coverage (>= 80%)"
        alerts: []
        note: "CI/CD gate; not a runtime metric"

      - nfr: NFR-007-001
        title: "Docker/K8s Container Health"
        alerts:
          - TaskFlowPodNotReady (CRITICAL, pod not ready, 2min)
          - TaskFlowPodRestarts (CRITICAL, > 1 restart, 15min)
          - TaskFlowInsufficientReplicas (CRITICAL, < 2 replicas, 1min)
        dashboard_panel: "Row 1: Active Pods + Row 5: HPA Status"
        health_checks:
          - "Liveness: GET /healthz every 10s, failureThreshold 3"
          - "Readiness: GET /readyz every 5s, failureThreshold 3"
          - "Startup: GET /healthz every 2s, failureThreshold 15 (30s max)"

    # ── Pre-Deploy Checklist Coverage ───────────────────────────
    pre_deploy_checklist:
      total_categories: 10
      categories:
        - name: "Test Results Verification"
          items: 7
          status: VERIFIED
          evidence: "210/210 tests passing, 56/56 AC covered"
        - name: "Code Review Verification"
          items: 7
          status: VERIFIED
          evidence: "Score 90.1/100, verdict PASS, all 96 files reviewed"
        - name: "Security Findings Resolution"
          items: 8
          status: VERIFIED
          evidence: "2 HIGH resolved (S-01 env var, S-03 NetworkPolicy), 3 MEDIUM triaged, 3 LOW tracked"
          high_findings_resolution:
            - {id: S-01, resolution: "WEBHOOK_ENCRYPTION_KEY env var in K8s secrets (not default)", status: RESOLVED}
            - {id: S-03, resolution: "Egress NetworkPolicy blocks private IP ranges (compensating control)", status: RISK_ACCEPTED}
          medium_findings_resolution:
            - {id: S-02, resolution: "JWT_SECRET not set in production K8s secrets", status: MITIGATED}
            - {id: S-06, resolution: "Accepted for v1.0 with monitoring", status: ACCEPTED}
            - {id: S-08, resolution: "RBAC enforced at service layer", status: ACCEPTED}
        - name: "Database Migrations"
          items: 6
          status: VERIFIED
          evidence: "6 migrations verified in staging PostgreSQL 16"
          migrations:
            - {file: "001-create-boards.sql", table: boards, status: VERIFIED}
            - {file: "002-create-board-members.sql", table: board_members, status: VERIFIED}
            - {file: "003-create-tasks.sql", table: tasks, status: VERIFIED}
            - {file: "004-create-webhooks.sql", table: webhooks, status: VERIFIED}
            - {file: "005-create-webhook-deliveries.sql", table: webhook_deliveries, status: VERIFIED}
            - {file: "006-create-activity-logs.sql", table: activity_logs, status: VERIFIED}
        - name: "Environment Variables"
          items: 8
          status: VERIFIED
          evidence: "7 required set, 1 (JWT_SECRET) verified absent"
        - name: "Docker Image"
          items: 6
          status: VERIFIED
          evidence: "taskflow-api:1.0.0, multi-stage Node.js 20 Alpine, CVE scan clean"
        - name: "Kubernetes Manifests"
          items: 5
          status: VERIFIED
          evidence: "Deployment, Service, Ingress, HPA, NetworkPolicy reviewed"
        - name: "Monitoring and Alerting"
          items: 11
          status: VERIFIED
          evidence: "Grafana dashboard, 7 alert rule groups, PagerDuty + Slack configured"
        - name: "Operational Readiness"
          items: 8
          status: VERIFIED
          evidence: "On-call identified, rollback reviewed, deployment window confirmed"
        - name: "Documentation"
          items: 5
          status: VERIFIED
          evidence: "17 endpoints documented, .env.example, docker-compose, runbook"

    # ── Deployment Phases ───────────────────────────────────────
    deployment_phases:
      - phase: "1. Database Migration"
        duration: "~5 min"
        traffic_split: "100:0 (Blue:Green)"
        steps: 3
        status: PLANNED
      - phase: "2. Green Environment Deployment"
        duration: "~3 min"
        traffic_split: "100:0"
        steps: 4
        status: PLANNED
      - phase: "3. Canary Validation (10%)"
        duration: "15 min"
        traffic_split: "90:10"
        steps: 2
        rollback_triggers: [error_rate_5pct, p95_300ms, cpu_80pct, memory_450Mi, readiness_failure]
        status: PLANNED
      - phase: "4. Full Traffic Switch"
        duration: "instant + 30 min observation"
        traffic_split: "0:100"
        steps: 3
        status: PLANNED
      - phase: "5. Post-Deployment Verification"
        duration: "~5 min"
        steps: 3
        status: PLANNED
      total_estimated_duration: "~54 min"

    # ── Rollback Mapping ────────────────────────────────────────
    rollback_triggers:
      error_rate:
        - {metric: "HTTP 5xx rate", threshold: "> 5%", window: "5min", action: "Immediate rollback"}
        - {metric: "HTTP 5xx count", threshold: "> 50", window: "5min", action: "Immediate rollback"}
        - {metric: "Webhook failure rate", threshold: "> 10%", window: "15min", action: "Investigate"}
      latency:
        - {metric: "API p95", threshold: "> 500ms", window: "5min", action: "Immediate rollback"}
        - {metric: "API p99", threshold: "> 1000ms", window: "5min", action: "Immediate rollback"}
        - {metric: "DB query p95", threshold: "> 200ms", window: "5min", action: "Investigate"}
      resources:
        - {metric: "Pod CPU", threshold: "> 85%", window: "3min", action: "Immediate rollback"}
        - {metric: "Pod memory", threshold: "> 90% (460Mi/512Mi)", window: "3min", action: "Immediate rollback"}
        - {metric: "DB pool", threshold: "> 85% (17/20)", window: "1min", action: "Investigate"}
      health:
        - {metric: "Readiness probe", threshold: "> 0 failures", window: "immediate", action: "Immediate rollback"}
        - {metric: "Liveness probe", threshold: "> 2 failures", window: "immediate", action: "Investigate"}
        - {metric: "Pod restarts", threshold: "> 1", window: "15min", action: "Immediate rollback"}

    # ── SLO Targets ─────────────────────────────────────────────
    slo_targets:
      - {slo: "Availability", target: ">= 99.5%", window: "30-day rolling", budget: "3.6 hours downtime"}
      - {slo: "API Latency (p95)", target: "<= 200ms", window: "30-day rolling", budget: "5% windows may exceed"}
      - {slo: "Webhook Delivery", target: ">= 99%", window: "24-hour rolling", budget: "1% failure allowed"}
      - {slo: "Error Rate", target: "< 0.1%", window: "24-hour rolling", budget: "0.1% 5xx allowed"}

