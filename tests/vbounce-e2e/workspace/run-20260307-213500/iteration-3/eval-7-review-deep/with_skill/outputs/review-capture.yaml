learnings:

  # --- SECURITY ---

  - id: L-SEC-001
    category: security
    title: "Dead code in security-critical paths defeats defense-in-depth"
    severity: high
    reusable: true
    description: >
      The WebhookDeliveryDriver contained correct SSRF protection (private IP
      blocking for 127.x, 10.x, 172.16-31.x, 192.168.x, 169.254.x, IPv6
      loopback/link-local), but WebhookService.deliverWebhook() used raw
      fetch() instead, bypassing the protection entirely. Security controls
      that exist in code but are not wired into the execution path provide
      zero protection and create a false sense of security.
    pattern: >
      When a security control class exists but the main service bypasses it,
      the control is dead code. Always verify that the security module is on
      the actual call path, not just present in the codebase.
    recommendation_for_testing: >
      Write an integration test that delivers a webhook to a private IP
      (e.g., http://127.0.0.1:9999) and assert it is blocked. This test
      will fail until SSRF protection is wired into the service layer.
    source_finding: S-03

  - id: L-SEC-002
    category: security
    title: "Hardcoded fallback secrets create production-exploitable defaults"
    severity: high
    reusable: true
    description: >
      The encryption key for webhook secrets used a hardcoded fallback
      ('default-encryption-key-32bytes!!') when the WEBHOOK_ENCRYPTION_KEY
      env var was not set. Any deployment that forgets to set this variable
      uses a publicly known key, allowing decryption of all webhook secrets.
      Similarly, default database passwords were hardcoded as fallbacks.
    pattern: >
      Never provide fallback values for security-critical configuration
      (encryption keys, signing secrets, database credentials). Fail fast at
      startup with a clear error message when required secrets are missing.
      Use a startup validation function that checks all required env vars
      before the application begins accepting requests.
    recommendation_for_testing: >
      Write a unit test that asserts the application throws on startup when
      WEBHOOK_ENCRYPTION_KEY is unset in production mode. Also test that
      the config module rejects empty or short encryption keys.
    source_finding: S-01

  - id: L-SEC-003
    category: security
    title: "Middleware ordering determines security effectiveness"
    severity: medium
    reusable: true
    description: >
      Rate limiting middleware ran after JWT authentication, meaning an
      attacker could flood the server with invalid JWTs that consume CPU
      for signature verification before rate limiting kicks in. Additionally,
      board member and webhook routes lacked the checkBoardAccess middleware
      at the router level, relying solely on service-layer RBAC.
    pattern: >
      Middleware order matters: rate limiting should precede CPU-intensive
      auth verification. Defense-in-depth means applying access checks at
      both middleware and service layers. Review app.use() ordering as a
      dedicated security audit step.
    recommendation_for_testing: >
      Write a load test that sends 200+ requests with invalid JWT tokens
      in rapid succession to verify rate limiting engages before auth
      processing. Also write integration tests hitting board member routes
      without proper board membership to verify defense-in-depth.
    source_finding: S-02, S-08

  - id: L-SEC-004
    category: security
    title: "DNS rebinding can bypass hostname-based SSRF checks"
    severity: medium
    reusable: true
    description: >
      SSRF protection checked hostname string patterns (regex matching
      private IP ranges) but did not resolve DNS first to verify the
      resolved IP was not private. An attacker could register a domain
      that resolves to a private IP (DNS rebinding), bypassing the
      hostname-based check entirely.
    pattern: >
      Hostname-based SSRF checks must include a DNS resolution step that
      validates the resolved IP address against private ranges. Check the
      IP after resolution but before making the HTTP request. Consider
      using a custom DNS resolver or the dns.resolve() API.
    recommendation_for_testing: >
      Test SSRF protection with hostnames that could resolve to private
      IPs. If possible, use a test DNS setup where a custom domain resolves
      to 127.0.0.1 and verify the request is blocked.
    source_finding: S-04

  # --- HALLUCINATION ---

  - id: L-HAL-001
    category: hallucination
    title: "Systematic package verification catches phantom dependencies"
    severity: low
    reusable: true
    description: >
      The hallucination audit checked all 97 items (19 npm packages, 5
      built-in modules, 75 API methods/features) and found zero fabricated
      APIs. However, it detected one phantom dependency: the uuid package
      was listed in package.json but never imported -- crypto.randomUUID()
      was used instead. It also caught a version mismatch where
      @types/express@5.0.0 was declared but Express 4.x was the actual
      dependency.
    pattern: >
      Hallucination detection should verify three layers: (1) every
      dependency in package.json is actually imported in source code,
      (2) every API method used matches the installed version's
      documentation, (3) version-specific behavior differences are flagged
      (e.g., express-rate-limit v6 vs v7 standardHeaders options). Unused
      dependencies are not hallucinations per se but indicate generation
      artifacts.
    recommendation_for_testing: >
      Run a dependency audit (e.g., depcheck or a custom script) that
      verifies every package.json dependency has at least one import in
      the source tree. Flag unused packages for removal.
    source_finding: H-02, H-05

  - id: L-HAL-002
    category: hallucination
    title: "Database feature verification prevents deployment failures"
    severity: low
    reusable: true
    description: >
      The hallucination audit verified 22 PostgreSQL features including
      gen_random_uuid() (PG14+), tsvector/GIN indexes, JSONB operators
      (?|), PL/pgSQL triggers, and partial indexes. All were confirmed
      valid for the target PG16. This is critical because AI-generated SQL
      can reference features from wrong database versions or fabricate
      function names that look plausible but do not exist.
    pattern: >
      For any AI-generated SQL, verify every function, operator, type, and
      syntax element against the target database version documentation.
      Common hallucination risks: non-existent aggregate functions, wrong
      index types, fabricated configuration parameters, and version-gated
      features used on older database targets.
    recommendation_for_testing: >
      Run all migration files against a real PostgreSQL 16 instance in CI.
      If migrations succeed, the SQL features are confirmed valid. Add a
      test that verifies the tsvector search pipeline produces expected
      results with weighted ranking.
    source_finding: H-03, H-04

  # --- CODE QUALITY ---

  - id: L-CQ-001
    category: code_quality
    title: "Clean Architecture dependency violations signal structural debt"
    severity: medium
    reusable: true
    description: >
      AppError was defined in the interface layer (HTTP concerns) but
      imported by application-layer services (task-service, board-service),
      violating the dependency rule where inner layers must not depend on
      outer layers. This creates hidden coupling between business logic
      and HTTP transport, making the application harder to reuse with
      alternative transports (CLI, message queue, gRPC).
    pattern: >
      Error types used across layers should live in the application or
      shared-kernel layer. Perform a dependency direction audit: for each
      import in application/ and domain/ layers, verify the imported module
      belongs to the same or an inner layer. Any import from interface/ or
      infrastructure/ into application/ or domain/ is a violation.
    recommendation_for_testing: >
      Write an architecture test (using a static analysis script or
      eslint-plugin-import) that enforces dependency direction rules.
      Assert that no file in src/application/ or src/domain/ imports
      from src/interface/ or src/infrastructure/.
    source_finding: Q-01

  - id: L-CQ-002
    category: code_quality
    title: "Non-null assertions on middleware-set properties are brittle"
    severity: low
    reusable: true
    description: >
      Controllers used `req.userId!` (TypeScript non-null assertion)
      throughout, relying on the assumption that auth middleware always
      runs first. This is safe in the current setup but breaks silently
      if middleware order changes or a route is accidentally unprotected.
      Domain events used a module-level singleton, creating hidden coupling
      and making unit tests harder to write in isolation.
    pattern: >
      Replace non-null assertions on request properties with either a
      runtime guard (`if (!req.userId) throw ...`) or a typed
      AuthenticatedRequest interface with a type guard function. For
      singletons, prefer constructor injection to enable test isolation
      and make dependencies explicit.
    recommendation_for_testing: >
      Write a test for each controller that verifies a 401/500 response
      when req.userId is undefined, confirming controllers handle the
      missing-auth case gracefully rather than crashing with a runtime
      TypeError.
    source_finding: Q-04, Q-03

  # --- PROCESS ---

  - id: L-PROC-001
    category: process
    title: "Non-transactional audit logging creates compliance gaps"
    severity: medium
    reusable: true
    description: >
      Task mutations and their corresponding activity log inserts were
      executed as separate database queries without a wrapping transaction.
      If the application crashes between the mutation and the log insert,
      the audit trail has a gap -- the change happened but was never
      recorded. This violates audit integrity requirements (STR-ALOG-R01).
      Additionally, membership changes and board modifications were not
      logged at all.
    pattern: >
      Any operation that requires an audit trail must wrap the mutation
      and the audit log insert in a single database transaction. Use
      pool.connect() with BEGIN/COMMIT, or implement a Unit of Work
      pattern. Ensure all state-changing operations (not just primary
      entities) have audit coverage -- membership, configuration, and
      settings changes are frequently overlooked.
    recommendation_for_testing: >
      Write an integration test that simulates a crash (e.g., mock the
      activity log insert to throw) and verify the task mutation is
      rolled back. Also verify that membership invite operations create
      activity log entries.
    source_finding: S-06, L-06

  - id: L-PROC-002
    category: process
    title: "STRIDE-based security verification provides systematic coverage"
    severity: info
    reusable: true
    description: >
      The security review used STRIDE threat modeling (Spoofing, Tampering,
      Repudiation, Information Disclosure, Denial of Service, Elevation of
      Privilege) as a systematic framework, verifying 73 specific threat
      mitigations across 12 components. This produced a detailed gap
      analysis showing 82% coverage with 9 unimplemented controls. The
      structured approach caught gaps that ad-hoc review would likely miss,
      such as missing X-Request-Id propagation and the auth-before-rate-limit
      ordering issue.
    pattern: >
      Use a threat model (STRIDE, PASTA, or similar) as the checklist for
      security review. Map each threat to a specific code location and
      verification status. This transforms security review from subjective
      "looks okay" to measurable "56/73 mitigations verified." Track partial
      implementations separately from full gaps to prioritize remediation.
    recommendation_for_testing: >
      For each HIGH and MEDIUM security gap identified, create a specific
      test case. The 10 critical gaps in security-findings.md section 3
      should each have at least one corresponding test that will fail until
      the gap is remediated.
    source_finding: security-findings.md section 3

  # --- PATTERNS ---

  - id: L-PAT-001
    category: patterns
    title: "Webhook delivery architecture should separate sync config from async dispatch"
    severity: medium
    reusable: true
    description: >
      The webhook system had multiple architectural issues that compounded:
      (1) delivery was synchronous despite being triggered via domain events
      with .catch(() => {}), adding latency to API responses; (2) each retry
      created a new delivery record instead of updating the existing one,
      bloating the delivery table; (3) the WebhookService mixed CRUD
      configuration with dispatch/retry logic in a 229-line class.
    pattern: >
      Separate webhook systems into three concerns: (a) WebhookConfigService
      for CRUD operations on webhook registrations, (b) WebhookDispatcher
      for async event-to-delivery translation using setImmediate or a
      message queue, (c) WebhookDeliveryDriver for the actual HTTP delivery
      with SSRF protection and HMAC signing. Use updateStatus for retry
      tracking rather than creating new records.
    recommendation_for_testing: >
      Write a timing test that measures API response latency with and
      without webhook subscribers configured. If delivery is truly async,
      latency should be comparable. Also verify that retry attempts update
      the existing delivery record rather than creating duplicates.
    source_finding: Q-02, L-03, L-08

  - id: L-PAT-002
    category: patterns
    title: "Search pagination with separate COUNT queries risks inconsistency"
    severity: low
    reusable: true
    description: >
      Both the search repository and activity log repository executed
      separate COUNT and SELECT queries for paginated results. Without a
      transaction wrapper, the count could become inconsistent with the
      actual results if data changes between the two queries. This is a
      common pattern in AI-generated code because it is simpler to express
      than window functions.
    pattern: >
      For paginated queries, prefer COUNT(*) OVER() as a window function
      in the main SELECT query. This executes as a single query, guarantees
      consistency between count and results, and reduces database round-trips
      by 50%. If separate queries are necessary, wrap them in a READ
      COMMITTED transaction.
    recommendation_for_testing: >
      Write a concurrent test that inserts/deletes records while a paginated
      search is in progress, then verify the returned total_count matches
      the actual number of results available. This validates consistency
      of the pagination metadata.
    source_finding: P-01, P-02

  - id: L-PAT-003
    category: patterns
    title: "HS256 algorithm support must be environment-gated"
    severity: medium
    reusable: true
    description: >
      The auth middleware supported HS256 (symmetric) JWT verification when
      JWT_SECRET was set, intended for development convenience. However,
      no check prevented this from being active in production. If JWT_SECRET
      is accidentally set in a production environment, an attacker who
      discovers the secret can forge tokens for any user.
    pattern: >
      Development convenience features that weaken security (symmetric JWT,
      mock auth, debug endpoints) must be gated behind an explicit
      environment check (NODE_ENV !== 'production'). Log a warning at
      startup when these features are active. Never rely solely on the
      absence of an env var to disable a dev feature -- someone will
      eventually set it in production.
    recommendation_for_testing: >
      Write a test that sets NODE_ENV=production and JWT_SECRET simultaneously,
      and assert that HS256 tokens are rejected. Write a separate test for
      NODE_ENV=development confirming HS256 tokens are accepted.
    source_finding: S-02

