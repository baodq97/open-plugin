version: '3.8'

services:
  api:
    build:
      context: .
      target: production
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taskflow
      DB_USER: taskflow
      DB_PASSWORD: taskflow
      DB_SSL: 'false'
      JWT_SECRET: dev-secret-for-local-testing-only
      WEBHOOK_ENCRYPTION_KEY: 'default-encryption-key-32bytes!!'
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U taskflow']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
